name: Catalog crawl

on:
  schedule:
    # 03:00 UTC = 04:00/05:00 Oslo (CET/CEST). Lavtrafikk hos nortabs.net.
    # Mandag-lørdag: incremental (browse-diff, ~1 min ved 0 endringer).
    - cron: '0 3 * * 1-6'
    # Søndag: full crawl — fanger tab-body-edits og bytt-tab-med-samme-count
    # som incremental ikke kan se via tab_count alene.
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Crawl mode'
        type: choice
        options: [incremental, full]
        default: incremental
      delay-ms:
        description: 'Politeness delay between requests (ms)'
        required: false
        default: '200'
      letters:
        description: 'Letters to crawl (comma-separated, blank = all)'
        required: false
        default: ''

# Én crawl om gangen. Hvis manuell dispatch starter mens cron kjører, vent (kanseller ikke).
concurrency:
  group: catalog-crawl
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ github.event.inputs.mode }}"
          elif [ "${{ github.event.schedule }}" = "0 3 * * 0" ]; then
            MODE="full"
          else
            MODE="incremental"
          fi
          echo "mode=${MODE}" >> "$GITHUB_OUTPUT"
          echo "Selected mode: ${MODE}"

      - name: Run crawler
        env:
          MODE: ${{ steps.mode.outputs.mode }}
          DELAY_MS: ${{ github.event.inputs.delay-ms || '200' }}
          LETTERS: ${{ github.event.inputs.letters }}
        run: |
          args="--delay-ms ${DELAY_MS}"
          if [ "${MODE}" = "incremental" ]; then
            args="${args} --incremental"
          fi
          if [ -n "${LETTERS}" ]; then
            args="${args} --letters ${LETTERS}"
          fi
          python crawler/crawl.py ${args}

      - name: Bump version.js if catalog.json changed
        id: bump
        run: |
          if git diff --quiet -- catalog.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "catalog.json uendret — ingen commit."
            exit 0
          fi
          python - <<'PYEOF'
          import pathlib, re, time
          p = pathlib.Path('version.js')
          txt = p.read_text(encoding='utf-8')
          new = re.sub(
              r"export const APP_VERSION = '.*?';",
              f"export const APP_VERSION = '{int(time.time())}';",
              txt,
          )
          p.write_text(new, encoding='utf-8')
          PYEOF
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.bump.outputs.changed == 'true'
        env:
          MODE: ${{ steps.mode.outputs.mode }}
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add catalog.json version.js
          summary=$(python - <<'PYEOF'
          import json, pathlib
          c = json.loads(pathlib.Path('catalog.json').read_text(encoding='utf-8'))
          letters = c.get('letters', {})
          n_artists = sum(len(v.get('artists', [])) for v in letters.values())
          n_songs   = sum(len(a.get('songs', [])) for v in letters.values() for a in v['artists'])
          n_tabs    = sum(len(s.get('tabs', [])) for v in letters.values() for a in v['artists'] for s in a['songs'])
          size = pathlib.Path('catalog.json').stat().st_size
          print(f"{len(letters)} letters / {n_artists} artists / {n_songs} songs / {n_tabs} tabs / {size:,} B")
          PYEOF
          )
          git commit -m "Crawl (${MODE}): ${summary}"

          # Remote can advance during the crawl (manual pushes, doc edits, etc).
          # The crawler only touches catalog.json + version.js, so rebasing on
          # top of unrelated commits is always clean. Retry on the race window
          # between fetch and push.
          for attempt in 1 2 3; do
            git fetch origin main
            if ! git rebase origin/main; then
              echo "rebase conflict on attempt ${attempt} — aborting"
              git rebase --abort || true
              exit 1
            fi
            if git push; then
              echo "pushed on attempt ${attempt}"
              exit 0
            fi
            echo "push attempt ${attempt} failed; retrying in $((attempt * 5))s"
            sleep $((attempt * 5))
          done
          echo "all push attempts failed"
          exit 1
